<p-toolbar styleClass="matia-toolbar">

  <div class="p-toolbar-group-start">

    <p-button [text]="true" styleClass="mobile-menu-btn" (click)="toggleMenu.emit()">

      <span class="material-symbols-outlined">menu</span>

    </p-button>

    <div class="brand-group">
      <div class="logo-circle">
        <img src="logomatia.png" alt="MATIA" class="logo-img">
      </div>
      <span class="brand-name">MATIA</span>
    </div>
  </div>

  <div class="p-toolbar-group-center">
    <div class="search-wrap">
      <i class="pi pi-search search-icon"></i>
      <input pInputText type="text" placeholder="Buscar leis, decretos..." class="search-input" />
    </div>
  </div>

  <div class="p-toolbar-group-end">
    <div class="user-info">
      <span class="user-name">{{ user()?.nome || 'Usuário' }}</span>
      <span class="user-role">{{ user()?.role }}</span>
    </div>
    <p-avatar icon="pi pi-user" shape="circle" size="large" styleClass="user-avatar" />
  </div>

</p-toolbar>
